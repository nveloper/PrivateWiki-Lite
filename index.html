<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">DB-less Wiki</title>
    <link id="page-favicon" rel="icon" href="">
    <link id="page-apple-icon" rel="apple-touch-icon" href="">
    <script>
        try {
            const config = JSON.parse(localStorage.getItem('siteConfig')) || {};
            const theme = config.themeMode || 'system';
            if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        } catch (e) {}
    </script>
    
    <!-- Material Web Components (M3) CDN -->
    <script type="importmap">
        {
          "imports": {
            "@material/web/": "https://esm.run/@material/web/"
          }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
        import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
        
        document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for LaTeX Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

    <!-- Google Fonts for Material Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=28">
</head>
<body class="light-theme">
    <header class="app-header">
        <md-icon-button id="menu-toggle">
            <md-icon>menu</md-icon>
        </md-icon-button>
        <h1 class="md-typescale-title-large" id="app-title" style="cursor:pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1"></h1>
        <script>
            try {
                const config = JSON.parse(localStorage.getItem('siteConfig')) || {};
                document.getElementById('page-title').textContent = config.siteTitle || 'DB-less Wiki';
            } catch (e) {}
        </script>
        <div class="spacer"></div>
        <md-icon-button id="search-btn" title="Search">
            <md-icon>search</md-icon>
        </md-icon-button>
        <md-icon-button id="random-btn" title="Random Document">
            <md-icon>shuffle</md-icon>
        </md-icon-button>

        <md-icon-button id="settings-btn" title="Settings">
            <md-icon>settings</md-icon>
        </md-icon-button>
    </header>

    <div class="app-layout">
        <aside class="sidebar hidden" id="sidebar">
            <div id="tree-container">
                <!-- Tree will be rendered here -->
            </div>
        </aside>

        <main class="content-area" id="main-content">
            <div id="markdown-container" class="markdown-body">
            </div>
        </main>
    </div>

    <!-- Settings Dialog -->
    <md-dialog id="settings-dialog" quick>
        <div slot="headline">Settings</div>
        <form slot="content" id="settings-form" method="dialog" style="display:flex; flex-direction:column; gap:16px;">

            <md-outlined-select label="Theme Mode" id="theme-mode-select" style="width:100%;">
                <md-select-option value="system"><div slot="headline">System Default</div></md-select-option>
                <md-select-option value="light"><div slot="headline">Light</div></md-select-option>
                <md-select-option value="dark"><div slot="headline">Dark</div></md-select-option>
                <md-select-option value="schedule"><div slot="headline">Schedule (Time-based)</div></md-select-option>
            </md-outlined-select>
            <div id="theme-schedule-group" class="setting-group" style="display:none; flex-direction:column; gap:8px;">
                <label style="display:block; font-weight:500; font-size:14px; color:var(--md-sys-color-primary);">Auto Dark Mode Schedule</label>
                <div style="display:flex; gap:12px; align-items:center;">
                    <div style="display:flex; flex-direction:column; gap:4px; flex:1;">
                        <label style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">Dark Mode Start</label>
                        <input type="time" id="dark-mode-start" step="1800" style="padding:8px 12px; border-radius:8px; border:1px solid var(--md-sys-color-outline); background:var(--md-sys-color-surface); color:var(--md-sys-color-on-surface); font-family:inherit; outline:none;">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px; flex:1;">
                        <label style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">Dark Mode End</label>
                        <input type="time" id="dark-mode-end" step="1800" style="padding:8px 12px; border-radius:8px; border:1px solid var(--md-sys-color-outline); background:var(--md-sys-color-surface); color:var(--md-sys-color-on-surface); font-family:inherit; outline:none;">
                    </div>
                </div>
            </div>
            <div class="setting-group" style="margin-top: 4px; position: relative;">
                <label style="display:block; margin-bottom:8px; font-weight:500;">Primary Color Theme</label>
                <div style="display:flex; align-items:center; gap:12px;">
                    <md-filled-tonal-button id="color-picker-trigger" type="button" style="--md-filled-tonal-button-container-shape: 999px;">
                        <div slot="icon" id="color-picker-preview" style="width:18px; height:18px; border-radius:50%; background-color:#6750A4; border:1px solid var(--md-sys-color-outline);"></div>
                        Choose Color
                    </md-filled-tonal-button>
                    <span id="color-value" style="font-size:14px; color:var(--md-sys-color-on-surface-variant); text-transform:uppercase;">#6750A4</span>
                </div>
                <md-menu id="color-palette-menu" anchor="color-picker-trigger" positioning="popover">
                    <div style="padding: 16px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 200px;">
                        <button type="button" class="color-chip" data-color="#6750A4" style="background-color: #6750A4;"></button>
                        <button type="button" class="color-chip" data-color="#006874" style="background-color: #006874;"></button>
                        <button type="button" class="color-chip" data-color="#006E1C" style="background-color: #006E1C;"></button>
                        <button type="button" class="color-chip" data-color="#B3261E" style="background-color: #B3261E;"></button>
                        <button type="button" class="color-chip" data-color="#9C4146" style="background-color: #9C4146;"></button>
                        <button type="button" class="color-chip" data-color="#978aff" style="background-color: #978aff;"></button>
                        <button type="button" class="color-chip" data-color="#3b82f6" style="background-color: #3b82f6;"></button>
                        <div class="custom-color-chip-wrapper" style="position: relative; width: 32px; height: 32px; border-radius: 50%; overflow: hidden; cursor: pointer;" title="Custom Color">
                            <button type="button" tabindex="-1" style="width: 100%; height: 100%; border: none; background-color: var(--md-sys-color-surface-variant); display: flex; align-items: center; justify-content: center; color: var(--md-sys-color-on-surface-variant); pointer-events: none;">
                                <md-icon style="font-size: 18px;">colorize</md-icon>
                            </button>
                            <input type="color" id="native-color-picker" style="position: absolute; top: -10px; left: -10px; width: 60px; height: 60px; opacity: 0; cursor: pointer; padding: 0; border: none;">
                        </div>
                    </div>
                    <div style="padding: 0 16px 16px 16px;">
                        <md-outlined-text-field id="custom-hex-input" label="Custom Hex" style="width: 100%;"></md-outlined-text-field>
                    </div>
                </md-menu>
            </div>
        </form>
        <div slot="actions">
            <md-text-button form="settings-form" value="cancel" id="cancel-settings-btn">Cancel</md-text-button>
            <md-filled-button form="settings-form" value="save" id="save-settings-btn">Save</md-filled-button>
        </div>
    </md-dialog>


    <!-- Search Dialog -->
    <md-dialog id="search-dialog" quick>
        <div slot="headline">Search Documents</div>
        <div slot="content" style="display:flex; flex-direction:column; gap:16px; min-width:300px; padding-top:8px;">
            <md-outlined-text-field id="search-input" label="Type to search..." style="width:100%;">
                <md-icon slot="leading-icon">search</md-icon>
            </md-outlined-text-field>
            <div id="search-results" style="display:flex; flex-direction:column; gap:8px; max-height: 400px; overflow-y: auto;">
                <!-- Results go here -->
            </div>
        </div>
        <div slot="actions">
            <md-text-button id="close-search-btn">Close</md-text-button>
        </div>
    </md-dialog>

    <!-- Mobile FAB Container (Pill shape) -->
    <div class="pill-fab-container">
        <button id="toc-fab-btn" class="custom-fab secondary" aria-label="Table of Contents">
            <md-icon>format_list_bulleted</md-icon>
        </button>
        <button id="scroll-to-top-btn" class="custom-fab" aria-label="Scroll to top">
            <md-icon>keyboard_arrow_up</md-icon>
        </button>
    </div>

    <!-- Mobile TOC Popover -->
    <div id="mobile-toc-popover" class="toc-popover hidden">
        <div class="toc-popover-header">
            <span style="font-weight: 500; font-size: 14px; color: var(--md-sys-color-primary);">Table of Contents</span>
            <md-icon-button id="close-mobile-toc-btn"><md-icon>close</md-icon></md-icon-button>
        </div>
        <div id="mobile-toc-content" class="toc-popover-content">
        </div>
    </div>

    <script src="app.js?v=41" type="module"></script>
</body>
</html>
